<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>社团活动报名</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 750px;
      margin: 0 auto;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
    }

    /* 视频左边热区可点击跳转 */
    .click-zone {
      position: absolute;
      left: 0;
      top: 30%;
      width: 50%;
      height: 50%;
      z-index: 10;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* 点击提示文字 */
    .tap-hint {
      position: absolute;
      left: 8%;
      top: 72%;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      z-index: 11;
      pointer-events: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: hintPulse 2s ease-in-out infinite;
    }

    .tap-hint .arrow {
      display: inline-block;
      animation: pointDown 1s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }

    @keyframes pointDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(3px); }
    }


  </style>
</head>
<body>

  <div class="video-wrapper" id="videoWrapper">
    <video
      id="videoPlayer"
      src="6月2日社团活动宣传.mp4"
      controls
      playsinline
      webkit-playsinline
      x5-video-player-type="h5"
      x5-video-player-fullscreen="true"
      preload="auto"
      poster=""
      autoplay
      muted
    ></video>

    <!-- 视频中间偏左的可点击跳转区域 -->
    <div class="click-zone" id="clickZone"></div>

    <!-- 点击提示文字 -->
    <div class="tap-hint" id="tapHint">
      <span class="arrow">👆</span> 点击报名活动
    </div>
  </div>

  <script>
    const video = document.getElementById('videoPlayer');
    const clickZone = document.getElementById('clickZone');
    const tapHint = document.getElementById('tapHint');

    const SIGNUP_URL = 'https://doc.weixin.qq.com/smartsheet/s3_AC0AaAYmACkCNCi7VZvVqSRykxWfO?scode=AJEAIQdfAAoUX8XCFcAagAdAboAK8&tab=tgxWu3&viewId=ve5kMc';

    // 尝试自动播放
    video.play().catch(() => {
      // 自动播放被阻止，等待用户交互
    });

    // 点击左边热区跳转
    clickZone.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      window.open(SIGNUP_URL, '_blank');
    });

    // 视频播放后隐藏提示文字
    video.addEventListener('play', () => {
      tapHint.style.opacity = '0';
      tapHint.style.transition = 'opacity 0.5s';
      setTimeout(() => { tapHint.style.display = 'none'; }, 500);
    });

    // 微信浏览器内全屏处理
    video.addEventListener('x5videoenterfullscreen', () => {
      clickZone.style.display = 'none';
      tapHint.style.display = 'none';
    });
    video.addEventListener('x5videoexitfullscreen', () => {
      clickZone.style.display = 'block';
      tapHint.style.display = '';
    });
  </script>

</body>
</html>
