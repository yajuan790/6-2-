<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>社团6月免费活动报名</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* ===== 首屏 ===== */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: #5BA8F0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      padding-bottom: 0;
    }

    /* 腾讯地图 Logo */
    .logo {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
    }
    .logo img {
      height: auto;
      width: 160px;
      max-width: 44vw;
      display: block;
    }

    /* 说明文本框 */
    .info-bubble {
      position: absolute;
      top: 114px;
      right: 4vw;
      width: 62vw;
      max-width: 380px;
      min-width: 200px;
      z-index: 10;
    }
    .info-bubble img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 主标题 */
    .hero-title {
      margin-top: 114px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      width: 100%;
      padding-left: 0;
    }
    .hero-title img {
      display: block;
      height: auto;
      max-width: 100%;
    }
    .hero-title .title-line1 {
      width: 28vw;
      max-width: 140px;
      min-width: 90px;
      align-self: flex-start;
      margin-left: 4vw;
      transform: rotate(-5deg);
      z-index: 2;
    }
    .hero-title .title-line2 {
      width: 92vw;
      max-width: 480px;
      min-width: 280px;
      margin-top: -2vh;
      z-index: 1;
    }
    .hero-title .title-line3 {
      width: 90vw;
      max-width: 460px;
      min-width: 260px;
      margin-top: -1vh;
      z-index: 2;
    }

    /* 涂鸦小人GIF */
    .mascot {
      position: relative;
      width: 100%;
      z-index: 1;
      margin-top: -70px;
    }
    .mascot img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 滚动提示 */
    .scroll-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      z-index: 10;
      animation: hintBounce 1.5s ease-in-out infinite;
    }
    .scroll-hint .arrow-down {
      width: 24px;
      height: 24px;
      border-right: 3px solid #fff;
      border-bottom: 3px solid #fff;
      transform: rotate(45deg);
    }
    @keyframes hintBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ===== 照片瀑布流区域 ===== */
    .gallery-section {
      position: relative;
      background: #5BA8F0;
      padding: 60px 0 0;
    }

    .photo-card {
      position: relative;
      width: 90%;
      max-width: 558px;
      margin: 0 auto 16px;
    }
    .photo-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ===== 尾屏 ===== */
    .cta-section {
      position: relative;
      background: #5BA8F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-height: 50vh;
      padding: 0 20px max(60px, env(safe-area-inset-bottom));
      margin-top: 0;
    }
    .cta-image {
      width: 90%;
      max-width: 558px;
      margin: 0 auto 40px;
    }
    .cta-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .cta-btn {
      display: inline-block;
      background: #FFD700;
      color: #1a1a2e;
      font-size: 22px;
      font-weight: 800;
      padding: 18px 50px;
      border-radius: 50px;
      text-decoration: none;
      border: 3px solid #1a1a2e;
      box-shadow: 0 8px 0 #1a1a2e;
      transition: all 0.2s;
      animation: btnPulse 2s ease-in-out infinite;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #1a1a2e;
    }
    @keyframes btnPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 0 #1a1a2e, 0 0 0 0 rgba(255,215,0,0.4); }
      50% { transform: scale(1.03); box-shadow: 0 8px 0 #1a1a2e, 0 0 30px 10px rgba(255,215,0,0.2); }
    }

    /* 装饰元素 */
    .deco-star {
      position: absolute;
      color: #FFD700;
      font-size: 24px;
      animation: starTwinkle 2s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* 音乐控制按钮 */
    .music-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(6px);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .music-btn:active {
      background: rgba(255,255,255,0.5);
    }
    .music-btn .music-icon {
      width: 22px;
      height: 22px;
      fill: #fff;
    }
    .music-btn .music-icon .sound-wave {
      transform-origin: left;
      transition: opacity 0.3s;
    }
    .music-btn.paused .music-icon .sound-wave {
      opacity: 0;
    }

    /* 响应式 */
    @media (max-width: 375px) {
      .hero-title .title-line1 { max-width: 120px; min-width: 80px; margin-left: 3vw; }
      .hero-title .title-line2 { max-width: 340px; min-width: 240px; }
      .hero-title .title-line3 { max-width: 320px; min-width: 220px; }
      .info-bubble { width: 65vw; min-width: 180px; }
    }
    @media (min-width: 430px) {
      .hero-title .title-line1 { max-width: 160px; margin-left: 5vw; }
      .hero-title .title-line2 { max-width: 520px; }
      .hero-title .title-line3 { max-width: 500px; }
    }
  </style>
</head>
<body>

  <!-- 背景音乐 -->
  <audio id="bgMusic" loop preload="auto" src="6月2日社团活动宣传.mp3"></audio>
  <button class="music-btn paused" id="musicBtn" aria-label="播放/暂停音乐">
    <svg class="music-icon" viewBox="0 0 24 24" fill="none">
      <!-- 喇叭主体 -->
      <path d="M4 9v6h3l5 4V5L7 9H4z" fill="#fff"/>
      <!-- 声波 -->
      <path class="sound-wave" d="M16 8a4 4 0 0 1 0 8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path class="sound-wave" d="M19 5a8 8 0 0 1 0 14" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- ===== 首屏 ===== -->
  <section class="hero" id="hero">
    <!-- Logo -->
    <div class="logo">
      <img src="logo.png" alt="腾讯地图">
    </div>

    <!-- 说明文本框 -->
    <div class="info-bubble">
      <img src="对话框内容.png" alt="大地图「趣玩搭子俱乐部」将继续攒各种「局」，邀请大家体验各类室内趣玩、户外运动等活动。">
    </div>

    <!-- 主标题 -->
    <div class="hero-title">
      <img src="标题1.png" alt="社团" class="title-line1">
      <img src="标题2.png" alt="6月免费活动" class="title-line2">
      <img src="标题3.png" alt="邀请大家报名啦！" class="title-line3">
    </div>

    <!-- 涂鸦小人 -->
    <div class="mascot">
      <img src="人物素材.gif" alt="活动 mascot">
    </div>

    <!-- 滚动提示 -->
    <div class="scroll-hint">
      <span>向下滑动探索活动</span>
      <div class="arrow-down"></div>
    </div>
  </section>

  <!-- ===== 照片瀑布流 ===== -->
  <section class="gallery-section" id="gallery">
    <!-- 射箭 -->
    <div class="photo-card" data-activity="archery">
      <img src="射箭.png" alt="射箭活动" id="img-archery">
    </div>

    <!-- 羽毛球 -->
    <div class="photo-card" data-activity="badminton">
      <img src="羽毛球.png" alt="羽毛球活动" id="img-badminton">
    </div>

    <!-- 桌游 -->
    <div class="photo-card" data-activity="boardgame">
      <img src="桌游.png" alt="桌游活动" id="img-boardgame">
    </div>
  </section>

  <!-- ===== 尾屏 CTA ===== -->
  <section class="cta-section" id="cta">
    <div class="cta-image">
      <img src="JOIN US.png" alt="#JOIN US 6月免费活动精选">
    </div>

    <a href="https://doc.weixin.qq.com/smartsheet/s3_AC0AaAYmACkCNCi7VZvVqSRykxWfO?scode=AJEAIQdfAAoUX8XCFcAagAdAboAK8&tab=tgxWu3&viewId=ve5kMc" class="cta-btn" target="_blank">
      活动报名入口
    </a>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const SIGNUP_URL = 'https://doc.weixin.qq.com/smartsheet/s3_AC0AaAYmACkCNCi7VZvVqSRykxWfO?scode=AJEAIQdfAAoUX8XCFcAagAdAboAK8&tab=tgxWu3&viewId=ve5kMc';

    // ===== 首屏入场动画 =====
    const heroTl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    heroTl
      .from('.logo', { y: -30, opacity: 0, duration: 0.8 })
      .from('.info-bubble', { x: 50, opacity: 0, duration: 0.8 }, '-=0.5')
      .from('.hero-title .title-line1', { y: 40, opacity: 0, duration: 0.7 }, '-=0.4')
      .from('.hero-title .title-line2', { y: 40, opacity: 0, duration: 0.7 }, '-=0.5')
      .from('.hero-title .title-line3', { y: 40, opacity: 0, duration: 0.7 }, '-=0.5')
      // .from('.hero-title .title-line4', { y: 40, opacity: 0, duration: 0.7 }, '-=0.5')
      .from('.mascot', { y: 80, opacity: 0, duration: 1 }, '-=0.4')
      .from('.scroll-hint', { opacity: 0, duration: 0.6 }, '-=0.3');

    // ===== 首屏视差滚动（标题淡出）=====
    gsap.to('.hero-title', {
      y: -150,
      opacity: 0,
      ease: 'none',
      scrollTrigger: {
        trigger: '.hero',
        start: 'top top',
        end: 'bottom top',
        scrub: true
      }
    });

    gsap.to('.scroll-hint', {
      opacity: 0,
      ease: 'none',
      scrollTrigger: {
        trigger: '.hero',
        start: '10% top',
        end: '30% top',
        scrub: true
      }
    });

    // ===== 照片卡片滚动入场 =====
    document.querySelectorAll('.photo-card').forEach((card, index) => {
      const direction = index % 2 === 0 ? 100 : -100;

      // 卡片滑入
      gsap.from(card, {
        x: direction,
        opacity: 0,
        duration: 1,
        ease: 'power3.out',
        scrollTrigger: {
          trigger: card,
          start: 'top 85%',
          end: 'top 50%',
          toggleActions: 'play none none reverse'
        }
      });

      // 文字标签浮现
      gsap.from(card.querySelector('.photo-label'), {
        y: 30,
        opacity: 0,
        duration: 0.8,
        delay: 0.3,
        ease: 'power2.out',
        scrollTrigger: {
          trigger: card,
          start: 'top 80%',
          toggleActions: 'play none none reverse'
        }
      });

      // 视差效果：照片内部反向移动
      const img = card.querySelector('img');
      gsap.to(img, {
        y: '-20%',
        ease: 'none',
        scrollTrigger: {
          trigger: card,
          start: 'top bottom',
          end: 'bottom top',
          scrub: true
        }
      });
    });

    // ===== 尾屏入场动画 =====
    gsap.from('.cta-image', {
      y: 60,
      opacity: 0,
      duration: 1,
      ease: 'power3.out',
      scrollTrigger: {
        trigger: '.cta-section',
        start: 'top 70%',
        toggleActions: 'play none none reverse'
      }
    });

    gsap.from('.cta-btn', {
      y: 40,
      opacity: 0,
      scale: 0.9,
      duration: 0.8,
      delay: 0.3,
      ease: 'back.out(1.7)',
      scrollTrigger: {
        trigger: '.cta-section',
        start: 'top 60%',
        toggleActions: 'play none none reverse'
      }
    });

    // ===== 背景音乐控制 =====
    const bgMusic = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    // 首次交互自动播放
    function tryAutoPlay() {
      bgMusic.play().then(() => {
        musicBtn.classList.remove('paused');
      }).catch(() => {
        // 浏览器阻止自动播放，等用户点击
      });
      document.removeEventListener('touchstart', tryAutoPlay);
      document.removeEventListener('click', tryAutoPlay);
    }
    document.addEventListener('touchstart', tryAutoPlay, { once: true });
    document.addEventListener('click', tryAutoPlay, { once: true });

    // 手动切换
    musicBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (bgMusic.paused) {
        bgMusic.play();
        musicBtn.classList.remove('paused');
      } else {
        bgMusic.pause();
        musicBtn.classList.add('paused');
      }
    });
  </script>

</body>
</html>
