<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>社团活动报名</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 750px;
      margin: 0 auto;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
    }

    /* 视频中间偏左的可点击跳转区域 */
    .click-zone {
      position: absolute;
      left: 5%;
      top: 40%;
      width: 45%;
      height: 30%;
      z-index: 10;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* 点击提示文字 */
    .tap-hint {
      position: absolute;
      left: 8%;
      top: 72%;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      z-index: 11;
      pointer-events: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: hintPulse 2s ease-in-out infinite;
    }

    .tap-hint .arrow {
      display: inline-block;
      animation: pointDown 1s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }

    @keyframes pointDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(3px); }
    }

    /* 底部固定跳转按钮（视频滑出视口后仍可点击） */
    .bottom-fixed-btn {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transform: translateY(100%);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .bottom-fixed-btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .bottom-fixed-btn a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: auto;
      max-width: 80%;
      padding: 0;
      background: none;
      border-radius: 0;
      font-size: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-fixed-btn a img {
      width: auto;
      height: 48px;
      max-width: 100%;
      display: block;
    }

    .bottom-fixed-btn a:active {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="video-wrapper" id="videoWrapper">
    <video
      id="videoPlayer"
      src="6月2日社团活动宣传.mp4"
      controls
      playsinline
      webkit-playsinline
      x5-video-player-type="h5"
      x5-video-player-fullscreen="true"
      preload="auto"
      poster=""
    ></video>

    <!-- 视频中间偏左的可点击跳转区域 -->
    <div class="click-zone" id="clickZone"></div>

    <!-- 点击提示文字 -->
    <div class="tap-hint" id="tapHint">
      <span class="arrow">👆</span> 点击报名活动
    </div>
  </div>

  <!-- 底部固定按钮（视频滑出屏幕后显示） -->
  <div class="bottom-fixed-btn" id="bottomFixedBtn">
    <a href="https://doc.weixin.qq.com/smartsheet/s3_AC0AaAYmACkCNCi7VZvVqSRykxWfO?scode=AJEAIQdfAAoUX8XCFcAagAdAboAK8&tab=tgxWu3&viewId=ve5kMc" target="_blank" rel="noopener">
      <img src="活动报名入口按钮.png" alt="活动报名入口">
    </a>
  </div>

  <script>
    const video = document.getElementById('videoPlayer');
    const clickZone = document.getElementById('clickZone');
    const tapHint = document.getElementById('tapHint');
    const bottomFixedBtn = document.getElementById('bottomFixedBtn');
    const videoWrapper = document.getElementById('videoWrapper');

    const SIGNUP_URL = 'https://doc.weixin.qq.com/smartsheet/s3_AC0AaAYmACkCNCi7VZvVqSRykxWfO?scode=AJEAIQdfAAoUX8XCFcAagAdAboAK8&tab=tgxWu3&viewId=ve5kMc';

    // 点击中间偏左区域跳转
    clickZone.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      window.open(SIGNUP_URL, '_blank');
    });

    // 视频播放后隐藏提示文字
    video.addEventListener('play', () => {
      tapHint.style.opacity = '0';
      tapHint.style.transition = 'opacity 0.5s';
      setTimeout(() => { tapHint.style.display = 'none'; }, 500);
    });

    // 监听视频区域是否在视口内，控制底部固定按钮显示
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            bottomFixedBtn.classList.remove('visible');
          } else {
            bottomFixedBtn.classList.add('visible');
          }
        });
      },
      { threshold: 0.3 }
    );

    observer.observe(videoWrapper);

    // 微信浏览器内全屏处理
    video.addEventListener('x5videoenterfullscreen', () => {
      clickZone.style.display = 'none';
      tapHint.style.display = 'none';
    });
    video.addEventListener('x5videoexitfullscreen', () => {
      clickZone.style.display = 'block';
      tapHint.style.display = '';
    });
  </script>

</body>
</html>
